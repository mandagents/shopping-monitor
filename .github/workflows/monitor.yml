name: PortaSplit Monitor
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: portasplit-monitor
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Cache Playwright browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-chromium-v1
      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium
      - name: Restore monitor state
        uses: actions/cache/restore@v5
        with:
          path: state.json
          key: portasplit-state-${{ github.run_id }}
          restore-keys: |
            portasplit-state-
      - name: Run monitor
        run: python -m src.run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state.json
          key: portasplit-state-${{ github.run_id }}
      - name: Notify on failure
        if: failure()
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            --data-urlencode "chat_id=${CID}" \
            --data-urlencode "text=⚠️ PortaSplit-Monitor: Lauf fehlgeschlagen (Run ${{ github.run_id }})." >/dev/null || true
